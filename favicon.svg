<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .s { fill: none; stroke: #111110; stroke-width: 1.7; stroke-linecap: round; }
    .f { fill: #111110; }
    @media (prefers-color-scheme: dark) {
      .s { stroke: #f0efec; }
      .f { fill: #f0efec; }
    }
  </style>
  <!-- rays -->
  <line class="s" x1="16" y1="1"  x2="16" y2="5.2"/>
  <line class="s" x1="16" y1="26.8" x2="16" y2="31"/>
  <line class="s" x1="1"  y1="16" x2="5.2" y2="16"/>
  <line class="s" x1="26.8" y1="16" x2="31" y2="16"/>
  <line class="s" x1="4.3"  y1="4.3"  x2="7.3"  y2="7.3"/>
  <line class="s" x1="24.7" y1="24.7" x2="27.7" y2="27.7"/>
  <line class="s" x1="27.7" y1="4.3"  x2="24.7" y2="7.3"/>
  <line class="s" x1="7.3"  y1="24.7" x2="4.3"  y2="27.7"/>
  <!-- face -->
  <circle class="s" cx="16" cy="16" r="8.2"/>
  <!-- eyes -->
  <circle class="f" cx="13.2" cy="14.5" r="1.15"/>
  <circle class="f" cx="18.8" cy="14.5" r="1.15"/>
  <!-- smile -->
  <path class="s" d="M12.5 18.5 Q16 21.8 19.5 18.5" fill="none"/>
